<!DOCTYPE html>
<html>
<head>
  <title>Xesoid Invoice</title>

  <!-- Barcode -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin: 5px; padding: 5px; width: 200px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    table, th, td { border: 1px solid black; padding: 8px; text-align: center; }
    button { padding: 10px; margin-top: 10px; }
    h2, h3 { margin-bottom: 5px; }
  </style>
</head>

<body>

<!-- Company Details -->
<h2>Xesoid Trends</h2>
<p>Kuzhalamannam, Palakkad - 678702</p>
<p>Ph: 9072945144</p>

<hr>

<!-- Customer -->
<h3>Customer Details</h3>
<input id="custName" placeholder="Customer Name">
<input id="custAddress" placeholder="Address">

<!-- Product -->
<h3>Product</h3>
<input id="product" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input id="qty" type="number" placeholder="Qty">

<button onclick="addItem()">Add Item</button>

<!-- Table -->
<table id="items">
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</table>

<!-- Total -->
<h3>Total: ₹ <span id="grandTotal">0</span></h3>

<!-- Invoice Info -->
<h3>Invoice No: <span id="invoiceNo"></span></h3>
<h3>Date: <span id="date"></span></h3>
<h3>Time: <span id="time"></span></h3>

<!-- Barcode -->
<svg id="barcode"></svg>

<br><br>

<!-- Download -->
<button onclick="downloadPDF()">Download PDF</button>

<script>
let total = 0;

// Generate Invoice Number
let invoiceNumber = "INV" + Date.now();
document.getElementById("invoiceNo").innerText = invoiceNumber;

// Generate Barcode
JsBarcode("#barcode", invoiceNumber);

// Date & Time
let now = new Date();
let date = now.toLocaleDateString();
let time = now.toLocaleTimeString();

document.getElementById("date").innerText = date;
document.getElementById("time").innerText = time;

// Add Item Function
function addItem() {
  let product = document.getElementById("product").value;
  let price = document.getElementById("price").value;
  let qty = document.getElementById("qty").value;

  if (!product || !price || !qty) {
    alert("Fill all product details!");
    return;
  }

  let itemTotal = price * qty;
  total += itemTotal;

  let table = document.getElementById("items");
  let row = table.insertRow();

  row.insertCell(0).innerText = product;
  row.insertCell(1).innerText = price;
  row.insertCell(2).innerText = qty;
  row.insertCell(3).innerText = itemTotal;

  document.getElementById("grandTotal").innerText = total;

  // Clear inputs
  document.getElementById("product").value = "";
  document.getElementById("price").value = "";
  document.getElementById("qty").value = "";
}

// Download PDF
function downloadPDF() {
  let element = document.body;
  html2pdf().from(element).save("invoice.pdf");
}
</script>

</body>
</html>
