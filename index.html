<!DOCTYPE html>
<html>
<head>
  <title>Xesoid Invoice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

  <style>
    body { font-family: Arial; background:#eee; padding:10px; }
    .container { max-width:420px; margin:auto; }

    input, select {
      width:100%; padding:8px; margin:4px 0;
    }

    button {
      width:100%; padding:10px; margin-top:5px;
      background:black; color:white; border:none;
    }

    .invoice {
      background:white; padding:15px; border:1px solid black;
    }

    .header {
      text-align:center;
      border-bottom:2px solid black;
      margin-bottom:10px;
    }

    .row {
      display:flex; justify-content:space-between;
      font-size:12px;
    }

    .box {
      border:1px solid black;
      padding:8px; margin-top:8px;
      font-size:12px;
    }

    table {
      width:100%; border-collapse:collapse;
      margin-top:10px; font-size:12px;
    }

    th, td {
      border:1px solid black;
      padding:5px; text-align:center;
    }

    .total { text-align:right; font-weight:bold; margin-top:10px; }

    .barcode { text-align:center; margin-top:10px; }

    .footer { margin-top:15px; font-size:12px; }

    .stamp {
      border:2px dashed green;
      color:green;
      text-align:center;
      margin-top:10px;
      padding:5px;
      font-weight:bold;
    }

    @media print {
      input, select, button { display:none; }
      body { background:white; }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- INPUT -->
  <input id="custName" placeholder="Customer Name">
  <input id="custAddress" placeholder="Customer Address">

  <input id="product" placeholder="Product">
  <input id="price" type="number" placeholder="Price">
  <input id="qty" type="number" placeholder="Qty">

  <select id="paymentType">
    <option value="COD">COD (40% Advance)</option>
    <option value="UPI">UPI (Full Paid)</option>
  </select>

  <button onclick="addItem()">Add Item</button>
  <button onclick="downloadPDF()">Download PDF</button>

  <!-- INVOICE -->
  <div class="invoice" id="invoice">

    <div class="header">
      <h3>XESOID TRENDS</h3>
      <div style="font-size:12px">
        Kuzhalamannam, Palakkad - 678702<br>
        Ph: 9072945144
      </div>
    </div>

    <div class="row">
      <div>Invoice: <span id="invoiceNo"></span></div>
      <div>Date: <span id="date"></span></div>
    </div>

    <div class="row">
      <div>Time: <span id="time"></span></div>
      <div>Status: <span id="status"></span></div>
    </div>

    <!-- FROM -->
    <div class="box">
      <b>FROM:</b><br>
      Xesoid Trends<br>
      Kuzhalamannam, Palakkad<br>
      Ph: 9072945144
    </div>

    <!-- TO -->
    <div class="box">
      <b>TO:</b><br>
      <span id="showName"></span><br>
      <span id="showAddress"></span>
    </div>

    <!-- ITEMS -->
    <table id="items">
      <tr>
        <th>Item</th>
        <th>₹</th>
        <th>Qty</th>
        <th>Total</th>
      </tr>
    </table>

    <div class="total">
      Total: ₹ <span id="grandTotal">0</span>
    </div>

    <!-- PAYMENT -->
    <div class="box">
      <b>Payment:</b> <span id="paymentMode"></span><br>
      <span id="paymentNote"></span>
    </div>

    <!-- BARCODE -->
    <div class="barcode">
      <svg id="barcode"></svg>
      <div style="font-size:12px">Scan Invoice ID</div>
    </div>

    <!-- SIGN -->
    <div class="footer">
      <br>
      ________________________<br>
      Authorized Signature
    </div>

    <!-- STAMP -->
    <div class="stamp">
      ✔ VERIFIED
    </div>

  </div>

</div>

<script>
let total = 0;
let invoiceNumber = "";

// RUN AFTER LOAD
window.onload = function () {

  invoiceNumber = "INV" + Date.now();
  document.getElementById("invoiceNo").innerText = invoiceNumber;

  // DATE
  let now = new Date();
  let date = now.getDate().toString().padStart(2,'0') + "/" +
             (now.getMonth()+1).toString().padStart(2,'0') + "/" +
             now.getFullYear();

  let time = now.getHours().toString().padStart(2,'0') + ":" +
             now.getMinutes().toString().padStart(2,'0');

  document.getElementById("date").innerText = date;
  document.getElementById("time").innerText = time;

  // BARCODE FIX
  setTimeout(() => {
    JsBarcode("#barcode", invoiceNumber, {
      format:"CODE128",
      width:2,
      height:50,
      displayValue:true
    });
  }, 500);
};


// ADD ITEM
function addItem() {

  let product = document.getElementById("product").value;
  let price = document.getElementById("price").value;
  let qty = document.getElementById("qty").value;

  if (!product || !price || !qty) {
    alert("Fill all fields");
    return;
  }

  let itemTotal = price * qty;
  total += itemTotal;

  let row = document.getElementById("items").insertRow();
  row.insertCell(0).innerText = product;
  row.insertCell(1).innerText = price;
  row.insertCell(2).innerText = qty;
  row.insertCell(3).innerText = itemTotal;

  document.getElementById("grandTotal").innerText = total;

  // CUSTOMER
  document.getElementById("showName").innerText =
    document.getElementById("custName").value;

  document.getElementById("showAddress").innerText =
    document.getElementById("custAddress").value;

  // PAYMENT
  let type = document.getElementById("paymentType").value;

  if (type === "COD") {
    document.getElementById("paymentMode").innerText = "Cash on Delivery";
    document.getElementById("paymentNote").innerText =
      "40% advance paid. Balance on delivery.";
    document.getElementById("status").innerText = "PARTIAL PAID";
  } else {
    document.getElementById("paymentMode").innerText = "UPI";
    document.getElementById("paymentNote").innerText =
      "Full payment received (100%).";
    document.getElementById("status").innerText = "PAID";
  }

  // CLEAR
  document.getElementById("product").value = "";
  document.getElementById("price").value = "";
  document.getElementById("qty").value = "";
}


// PDF
function downloadPDF() {
  let element = document.getElementById("invoice");

  setTimeout(() => {
    html2pdf().from(element).save("invoice.pdf");
  }, 700);
}
</script>

</body>
  </html>
