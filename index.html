<!DOCTYPE html>
<html>
<head>
  <title>Xesoid Invoice</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 10px;
      background: #f5f5f5;
    }

    .container {
      max-width: 400px;
      margin: auto;
    }

    .invoice {
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
      margin: 5px 0;
    }

    .center {
      text-align: center;
      font-size: 12px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 12px;
    }

    th, td {
      border-bottom: 1px solid #ddd;
      padding: 5px;
      text-align: center;
    }

    .total {
      text-align: right;
      margin-top: 10px;
      font-weight: bold;
    }

    svg {
      display: block;
      margin: 10px auto;
    }

    /* Hide buttons in PDF */
    @media print {
      button, input {
        display: none;
      }
      body {
        background: white;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- INPUT SECTION -->
  <div class="no-print">
    <input id="custName" placeholder="Customer Name">
    <input id="custAddress" placeholder="Address">

    <input id="product" placeholder="Product">
    <input id="price" type="number" placeholder="Price">
    <input id="qty" type="number" placeholder="Qty">

    <button onclick="addItem()">Add Item</button>
    <button onclick="downloadPDF()">Download PDF</button>
  </div>

  <!-- INVOICE SECTION -->
  <div class="invoice" id="invoice">

    <h2>Xesoid Trends</h2>
    <div class="center">
      Kuzhalamannam, Palakkad - 678702<br>
      Ph: 9072945144
    </div>

    <hr>

    <p><b>Customer:</b> <span id="showName"></span></p>
    <p><b>Address:</b> <span id="showAddress"></span></p>

    <p><b>Invoice:</b> <span id="invoiceNo"></span></p>
    <p><b>Date:</b> <span id="date"></span></p>
    <p><b>Time:</b> <span id="time"></span></p>

    <table id="items">
      <tr>
        <th>Item</th>
        <th>₹</th>
        <th>Qty</th>
        <th>Total</th>
      </tr>
    </table>

    <div class="total">
      Total: ₹ <span id="grandTotal">0</span>
    </div>

    <svg id="barcode"></svg>

  </div>

</div>

<script>
let total = 0;

// Invoice Number
let invoiceNumber = "INV" + Date.now();
document.getElementById("invoiceNo").innerText = invoiceNumber;

// Barcode
JsBarcode("#barcode", invoiceNumber);

// Date & Time
let now = new Date();
document.getElementById("date").innerText = now.toLocaleDateString();
document.getElementById("time").innerText = now.toLocaleTimeString();

// Add Item
function addItem() {
  let product = document.getElementById("product").value;
  let price = document.getElementById("price").value;
  let qty = document.getElementById("qty").value;

  if (!product || !price || !qty) {
    alert("Fill all fields");
    return;
  }

  let itemTotal = price * qty;
  total += itemTotal;

  let table = document.getElementById("items");
  let row = table.insertRow();

  row.insertCell(0).innerText = product;
  row.insertCell(1).innerText = price;
  row.insertCell(2).innerText = qty;
  row.insertCell(3).innerText = itemTotal;

  document.getElementById("grandTotal").innerText = total;

  // Show customer in invoice
  document.getElementById("showName").innerText =
    document.getElementById("custName").value;

  document.getElementById("showAddress").innerText =
    document.getElementById("custAddress").value;

  // Clear inputs
  document.getElementById("product").value = "";
  document.getElementById("price").value = "";
  document.getElementById("qty").value = "";
}

// PDF
function downloadPDF() {
  let element = document.getElementById("invoice");
  html2pdf().from(element).save("invoice.pdf");
}
</script>

</body>
</html>
