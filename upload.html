<!DOCTYPE html>
<html>
<head>
  <title>Upload Product</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px;}
    input, button { width:100%; padding:10px; margin:5px 0;}
    .box { max-width:400px; margin:auto; background:#222; padding:20px; border-radius:10px;}
    a { color: lightblue; }
  </style>
</head>

<body>

<a href="index.html">Go to Invoice Page</a>

<div class="box">
  <h2>Upload Product</h2>

  <input id="sku" readonly>
  <input id="provider" placeholder="Provider">
  <input id="name" placeholder="Product Name">
  <input id="desc" placeholder="Description">
  <input id="price" placeholder="Price" type="number">
  <input id="contact" placeholder="Contact Number">

  <button onclick="saveProduct()">Save</button>
</div>

<script>
const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

// Auto SKU
window.onload = () => {
  sku.value = "SKU" + Date.now();
};

function saveProduct() {
  let data = {
    sku: sku.value,
    provider: provider.value,
    name: name.value,
    desc: desc.value,
    price: price.value,
    contact: contact.value
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("Saved!");
    location.reload();
  });
}
</script>

</body>
  </html>
